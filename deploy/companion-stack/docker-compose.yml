# Keeper companion stack: Synapse homeserver + mautrix bridges (self-hosted).
#
# This stack is user-operated infrastructure. Keeper itself is a client only and
# ships no hosted services; see deploy/companion-stack/README.md for the full
# setup guide (config generation, database creation, bridge registration).
#
# Federation is intentionally NOT exposed: this is a private homeserver for the
# operator's own accounts and bridges. No federation listener/port (8448) is
# configured and no signing-key/TLS federation setup is required. Only the
# client-server API (8008) is published.
#
# Postgres: the stack expects an EXISTING postgres reachable at POSTGRES_HOST
# (see .env.example). If you don't have one, uncomment the `postgres` service
# below and set POSTGRES_HOST=postgres.

name: keeper-companion

services:
  synapse:
    # Pin to a concrete release; check https://github.com/element-hq/synapse/releases
    image: matrixdotorg/synapse:v1.156.0
    restart: unless-stopped
    ports:
      # Client-server API only. Federation is disabled; do not expose 8448.
      - "8008:8008"
    volumes:
      # /data holds homeserver.yaml, log config, media_store and the bridge
      # registration files (appservice YAMLs) referenced from homeserver.yaml.
      - ./data/synapse:/data
    environment:
      # Used only by the one-shot `generate` step (see README quickstart);
      # at runtime Synapse reads /data/homeserver.yaml exclusively.
      SYNAPSE_SERVER_NAME: ${SERVER_NAME}
      SYNAPSE_REPORT_STATS: "no"
    extra_hosts:
      # Lets POSTGRES_HOST=host.docker.internal reach a postgres on the docker
      # host (works on Linux too thanks to host-gateway).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  mautrix-telegram:
    # Pin to a concrete release; check https://github.com/mautrix/telegram/releases
    image: dock.mau.dev/mautrix/telegram:v0.2606.0
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      # /data holds config.yaml + registration.yaml (generated on first runs,
      # see README). registration.yaml must be copied/mounted into synapse's
      # /data and listed under app_service_config_files.
      - ./data/telegram:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mautrix-whatsapp:
    # Pin to a concrete release; check https://github.com/mautrix/whatsapp/releases
    image: dock.mau.dev/mautrix/whatsapp:v0.2606.0
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./data/whatsapp:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mautrix-signal:
    # Pin to a concrete release; check https://github.com/mautrix/signal/releases
    image: dock.mau.dev/mautrix/signal:v0.2606.0
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./data/signal:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # OPTIONAL: uncomment if you don't already run a postgres instance.
  # Then set POSTGRES_HOST=postgres in .env and create the databases inside
  # this container (see README "Create the databases").
  #
  # postgres:
  #   image: postgres:18
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     # Synapse requires C locale + UTF8 encoding (see README).
  #     POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
  #   volumes:
  #     - ./data/postgres:/var/lib/postgresql/data
