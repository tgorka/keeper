name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Signed, notarized macOS release (aarch64)
    runs-on: macos-latest
    steps:
      # fetch-depth: 0 pulls full history + tags so the "Egress diff note" step can
      # diff docs/egress.md against the previous tag (Story 11.2, NFR-11, AD-23).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      # App Store Connect notarization needs the API key on disk. The secret holds
      # the base64-encoded .p8; decode it to a file that tauri-action can read. Note
      # the secret is named APPLE_API_KEY_P8_BASE64 (not APPLE_API_KEY) so it never
      # collides with the APPLE_API_KEY env var below, which is the Key ID string.
      # Signing/notarization is OPTIONAL: with no Apple secrets configured the release
      # still builds and publishes an UNSIGNED (ad-hoc) bundle, clearly labeled. Add the
      # secrets (docs/release.md) to get Developer ID signing + notarization.
      - name: Detect Apple signing secrets
        id: signing
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          set -euo pipefail
          if [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple signing secrets absent — publishing an unsigned (ad-hoc) build."
          fi

      # Build + codesign the keeper-rec capture sidecar BEFORE tauri-action bundles
      # and notarizes the app (the externalBin notarization rough edge, tauri#11992):
      # externalBin is copied into the bundle as-is, so it must already carry a valid
      # hardened-runtime Developer ID signature or notarization staples fail. We import
      # the Developer ID cert into a temp keychain (reusing the existing signing
      # secrets), build the sidecar, then sign it in place. tauri-action reuses the same
      # login keychain for its own signing, so the identity remains available to it.
      - name: Import Developer ID certificate (signed path)
        if: steps.signing.outputs.signed == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build & codesign keeper-rec sidecar (signed path)
        if: steps.signing.outputs.signed == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # `signed==true` only guarantees the cert + notarization key are present;
          # the identity string is a separate secret. Fail clearly if it's unset
          # rather than letting `codesign --sign ""` produce an ambiguous error.
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "error: APPLE_SIGNING_IDENTITY is empty on the signed path." >&2
            exit 1
          fi
          bun run rec:build
          BIN="src-tauri/crates/keeper/binaries/keeper-rec-aarch64-apple-darwin"
          codesign --force --options runtime \
            --entitlements src-tauri/crates/keeper/keeper-rec.entitlements \
            --sign "$APPLE_SIGNING_IDENTITY" "$BIN"
          codesign -dv --verbose=2 "$BIN"

      - name: Build, sign, notarize, and publish release (signed path)
        if: steps.signing.outputs.signed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing (base64 .p12 + password + identity + keychain password).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # App Store Connect API-key notarization.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/api_key.p8
          # Signed auto-updates (Story 11.2, NFR-12). Tauri signs the updater artifacts
          # with this minisign private key; the app verifies each download against the
          # committed `plugins.updater.pubkey` before installing. Both come only from
          # GitHub secrets — the private key is never in the repo. If either secret is
          # empty (e.g. before a maintainer provisions their keypair per docs/release.md)
          # the updater artifacts are simply not signed.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "keeper ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/crates/keeper/tauri.conf.json --target aarch64-apple-darwin

      # Unsigned path: plain ad-hoc build (no keychain import, no notarization), DMG via
      # hdiutil (bundle_dmg AppleScript styling is flaky headless), draft release via gh.
      - name: Build unsigned (ad-hoc) bundle
        if: steps.signing.outputs.signed == 'false'
        env:
          # Updater (minisign) signing is independent of Apple codesigning: when the
          # keypair secrets exist, even Apple-unsigned builds ship signed updater
          # artifacts + latest.json, so in-app auto-update works. Without them the
          # build falls back to no updater artifacts (first bootstrap releases).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # "-" = ad-hoc codesign during bundling, so the updater tar.gz contains the
          # final (ad-hoc-signed) app rather than an unsigned one.
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          set -euo pipefail
          # Build the keeper-rec sidecar and ad-hoc-sign it (hardened runtime) before
          # tauri build bundles it via externalBin — mirrors the signed path, minus a
          # Developer ID identity. macOS 15+ rejects ad-hoc SCK at runtime (Cap #1722),
          # but that only affects real capture, not this bundling/handshake stub.
          bun run rec:build
          REC_BIN="src-tauri/crates/keeper/binaries/keeper-rec-aarch64-apple-darwin"
          codesign --force --options runtime -s - "$REC_BIN"
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            bun run tauri build --config src-tauri/crates/keeper/tauri.conf.json --target aarch64-apple-darwin --bundles app
          else
            bun run tauri build --config src-tauri/crates/keeper/tauri.conf.json --config '{"bundle":{"createUpdaterArtifacts":false}}' --target aarch64-apple-darwin --bundles app
          fi
          BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          APP="$BUNDLE/keeper.app"
          codesign --verify "$APP" 2>/dev/null || codesign --force --deep -s - "$APP"
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create -volname "keeper" -srcfolder "$APP" -ov -format UDZO "keeper_${VERSION}_aarch64.dmg"
          ditto -c -k --keepParent "$APP" "keeper_${VERSION}_aarch64_app.zip"
          # Updater artifacts (only when the signing key was present): normalize names
          # and compose latest.json for the tauri-plugin-updater endpoint
          # (.../releases/latest/download/latest.json).
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            TARBALL=$(find "$BUNDLE" -maxdepth 1 -name "keeper*.app.tar.gz" | head -1)
            SIGFILE="$TARBALL.sig"
            cp "$TARBALL" "keeper_${VERSION}_aarch64.app.tar.gz"
            cp "$SIGFILE" "keeper_${VERSION}_aarch64.app.tar.gz.sig"
            SIGNATURE=$(cat "$SIGFILE")
            PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/keeper_${VERSION}_aarch64.app.tar.gz"
            SIGNATURE="$SIGNATURE" URL="$URL" VERSION="$VERSION" PUB_DATE="$PUB_DATE" python3 - <<'PY'
          import json, os
          json.dump({
              "version": os.environ["VERSION"],
              "notes": "keeper release",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": {
                  "darwin-aarch64": {
                      "signature": os.environ["SIGNATURE"],
                      "url": os.environ["URL"],
                  }
              },
          }, open("latest.json", "w"), indent=2)
          PY
          fi

      - name: Publish unsigned draft release
        if: steps.signing.outputs.signed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSETS=("keeper_${VERSION}_aarch64.dmg" "keeper_${VERSION}_aarch64_app.zip")
          [ -f latest.json ] && ASSETS+=("keeper_${VERSION}_aarch64.app.tar.gz" "keeper_${VERSION}_aarch64.app.tar.gz.sig" "latest.json")
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "keeper $GITHUB_REF_NAME (unsigned build)" \
            --notes "Unsigned (ad-hoc) macOS build — first launch requires right-click → Open. In-app auto-update is enabled via signed updater artifacts. Add Apple signing secrets per docs/release.md for notarized releases." \
            "${ASSETS[@]}" \
          || gh release upload "$GITHUB_REF_NAME" "${ASSETS[@]}" --clobber

      # Per-release egress diff note (Story 11.2, NFR-11, AD-23): docs/egress.md is the
      # canonical, diffable egress surface. Diff it against the previous tag into the job
      # summary so any change to where keeper sends traffic is visible per release. On the
      # first tag (no previous tag) publish the file itself as the baseline. Requires the
      # full-history checkout (fetch-depth: 0) above.
      - name: Egress diff note
        if: always()
        # REF comes in as an env var, never interpolated into the script body, so a
        # crafted ref can't inject shell (GitHub-Actions script-injection guard).
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          {
            echo "## Egress diff (docs/egress.md)"
            echo
            if [ ! -f docs/egress.md ]; then
              echo "> docs/egress.md is missing at \`$REF\` — the egress surface is undocumented for this release."
            elif prev="$(git describe --tags --abbrev=0 "$REF^" 2>/dev/null)" && [ -n "$prev" ]; then
              # Capture the diff so we can distinguish "no change" from a diff failure
              # instead of blindly swallowing both with `|| true`.
              if diff="$(git diff "$prev" "$REF" -- docs/egress.md)"; then
                if [ -z "$diff" ]; then
                  echo "No change to docs/egress.md since \`$prev\`."
                else
                  echo "Changes since \`$prev\`:"
                  echo
                  echo '```diff'
                  echo "$diff"
                  echo '```'
                fi
              else
                echo "> Could not diff docs/egress.md against \`$prev\` (history incomplete) — review the file manually."
              fi
            else
              echo "No previous tag — publishing the current egress surface as the baseline:"
              echo
              echo '```markdown'
              cat docs/egress.md
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
