name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # tauri-build's `externalBin` resource check aborts the keeper build
      # script when `binaries/keeper-rec-aarch64-apple-darwin` is absent, so
      # clippy/nextest need the real sidecar staged first (same script the
      # release workflow uses; includes its own smoke test).
      - run: bash scripts/build-keeper-rec.sh
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo nextest run --no-tests=pass
        working-directory: src-tauri

  recording:
    name: Recording sidecar (unit tests + gapless-concat gate)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # Pure-logic unit tests (Rotation.swift, Story 17.1) plus the NFR-22
      # gapless-concat gate (Story 17.4): fixtures are generated on the runner
      # via AVAssetWriter (muxing only, no ScreenCaptureKit), so still no
      # capture hardware and no code-signing are needed.
      - run: bash scripts/test-keeper-rec.sh

  ios:
    name: iOS (compile check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Compile-only iOS gate (AD-32): no signing, no simulator, no Apple creds.
      # Blocks by failure; recorded as a required PR status check in docs/release.md.
      - run: cargo check --workspace --target aarch64-apple-ios
        working-directory: src-tauri

  licenses:
    name: License firewall (cargo-deny, JS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # Licensing/supply-chain firewall only (Story 11.1). Advisory/vulnerability
      # gating is intentionally out of scope here: the crate graph carries pre-existing
      # `unmaintained` RUSTSEC advisories for Linux-only gtk-rs GTK3 bindings, which are
      # irrelevant to this macOS-first app and would make the required check perma-red.
      - run: cargo deny check licenses bans sources
        working-directory: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run check:licenses

  build:
    name: Tauri build (macOS)
    runs-on: macos-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run tauri:build -- --no-bundle
