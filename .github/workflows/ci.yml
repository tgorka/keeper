name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo nextest run --no-tests=pass
        working-directory: src-tauri

  ios:
    name: iOS (compile check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Compile-only iOS gate (AD-32): no signing, no simulator, no Apple creds.
      # Blocks by failure; required-status wiring is Story 15.4.
      - run: cargo check --workspace --target aarch64-apple-ios
        working-directory: src-tauri

  licenses:
    name: License firewall (cargo-deny, JS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # Licensing/supply-chain firewall only (Story 11.1). Advisory/vulnerability
      # gating is intentionally out of scope here: the crate graph carries pre-existing
      # `unmaintained` RUSTSEC advisories for Linux-only gtk-rs GTK3 bindings, which are
      # irrelevant to this macOS-first app and would make the required check perma-red.
      - run: cargo deny check licenses bans sources
        working-directory: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run check:licenses

  build:
    name: Tauri build (macOS)
    runs-on: macos-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run tauri:build -- --no-bundle
