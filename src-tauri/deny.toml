# cargo-deny configuration — license firewall for an Apache-2.0 project.
# Run: cargo deny check (from src-tauri/)

[graph]
all-features = false

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
# AGPL/GPL code must never be linked into the client.
deny = []

[advisories]
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
