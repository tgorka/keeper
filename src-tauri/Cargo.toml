[workspace]
resolver = "2"
members = ["crates/keeper-core", "crates/keeper"]

[workspace.package]
version = "0.1.0"
authors = ["Tomasz Gorka"]
license = "Apache-2.0"
repository = "https://github.com/tgorka/keeper"
edition = "2021"

# Shared lints — single source of truth; each crate opts in with `[lints] workspace = true`.
[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"

[workspace.dependencies]
# Tauri shell
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
tauri-plugin-opener = "2"
# Serialization + IPC bindings
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ts-rs = "12"
# Async runtime + observability
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
# Matrix core (homed in keeper-core; unused in 1.1 but owned here per AD-6)
matrix-sdk = { version = "0.18", features = ["e2e-encryption", "sqlite", "sso-login"] }
matrix-sdk-ui = "0.18"
# Platform ports
dirs = "6"
# Keychain (macOS Keychain via the OS-native backend) — shell-only, the only genuinely new crate.
keyring = { version = "3", features = ["apple-native"] }
# Account registry + opaque account ids (both already present transitively via matrix-sdk).
ulid = "1"
rusqlite = { version = "0.37", features = ["bundled"] }
