<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- viewport-fit=cover exposes env(safe-area-inset-*) for edge-to-edge phone
         rendering (Story 13.5, FR-59); interactive-widget=resizes-content resizes
         the layout viewport under the on-screen keyboard on Chromium webviews
         (WKWebView ignores it and uses the visualViewport-driven --kb-inset). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
